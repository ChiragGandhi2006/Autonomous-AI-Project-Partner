<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Dustbin – Autonomous AI Project Partner</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Basic styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background: #0d6efd;
            color: white;
            padding: 12px 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .box {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        h3 {
            margin-top: 0;
        }

        pre {
            white-space: pre-wrap;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    Smart Dustbin
</header>

<div class="container">

    <!-- IDEA -->
    <div id="ideaBox" class="box">
        <h3>💡 IDEA</h3>
        <p>Waiting for input...</p>
    </div>

    <!-- PLAN -->
    <div id="planBox" class="box">
        <h3>🧠 PLAN</h3>
        <p>No plan available</p>
    </div>

    <!-- OPTIONS -->
    <div id="optionsBox" class="box">
        <h3>⚙️ OPTIONS</h3>
        <p>Options will appear here</p>
    </div>

    <!-- INPUT -->
    <div class="input-area">
        <input
            id="projectInput"
            type="text"
            placeholder="Describe your project idea..."
        />
        <button id="sendBtn">Send</button>
    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
